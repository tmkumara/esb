apiVersion: esb/v1
kind: RouteSpec

metadata:
  name: customer-lookup
  version: "1.0"
  description: "GET /api/v1/customers/{id} → SOAP GetCustomer → JSON response"
  tags: [customer, soap, demo]
  owner: platform-team

source:
  type: rest
  method: GET
  path: /v1/customers/{id}
  produces: application/json

target:
  type: soap
  operation: GetCustomer
  endpointUrl: "http://localhost:9090/mock/soap/customer-service"
  timeout:
    connectMs: 5000
    readMs: 15000
  retry:
    maxAttempts: 3
    backoffType: exponential
    initialDelayMs: 500
    multiplier: 2.0
    maxDelayMs: 10000

# Jolt: SOAP XML response → clean JSON for the REST caller
transform:
  request:
    type: passthrough        # GET has no body; header {id} is used in SOAP pre-processor
  response:
    type: jolt
    resource: classpath:jolt/customer-response.json

correlation:
  header: X-Correlation-ID
  generateIfMissing: true
  propagateToTarget: true

errorHandling:
  fallbackHttpStatus: 503
  fallbackBody: '{"code":"CUSTOMER_SERVICE_UNAVAILABLE","message":"Customer service is temporarily unavailable. Please retry."}'
